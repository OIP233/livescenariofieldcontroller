/* — TAAK & PROCEDURE (SOP-stappen + acties + AI-regie + ambient, per fase) — */
TAB_RENDERERS.taak = function() {
  const sc = STATE.current;
  STATE._taakOpen = STATE._taakOpen || {};
  const steps = sc.sop?.steps || [];
  const locs = sc.locations || [];
  const a = sc.assignment || {};

  // ── helper: één SOP-stap (gi = globale index in sc.sop.steps) ──
  function renderStep(s, gi) {
    const phaseOpts = PHASES_PROC.filter(p => p !== 'deviation').map(p =>
      `<option value="${p}" ${s.phase === p ? 'selected' : ''}>${PHASE_LABELS[p]}</option>`).join('');
    const locOpts = ['<option value="">— geen —</option>']
      .concat(locs.map(l => `<option value="${escapeAttr(l.id)}" ${s.locationId === l.id ? 'selected' : ''}>${escapeHtml(l.label || l.id)}</option>`)).join('');
    const lsrOpts = Object.entries(LIFE_SAVING_RULES).map(([v,l]) => {
      const checked = (s.lsrTags || []).includes(v);
      return `<label class="checkbox-row" style="font-size:11px;display:inline-flex;margin-right:14px">
        <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleLsrTag(${gi}, '${v}', this.checked)">
        <span class="checkbox-label" style="font-size:11px">${escapeHtml(l)}</span>
      </label>`;
    }).join('');
    return `
      <div class="array-item">
        <div class="array-item-header">
          <span class="array-item-label">Stap · <code style="font-family:var(--mono);color:var(--text-dim)">${escapeHtml(s.id)}</code></span>
          <div class="array-item-actions">
            <button class="btn-icon" title="Omhoog" onclick="arrayMove('sop.steps', ${gi}, -1)">↑</button>
            <button class="btn-icon" title="Omlaag" onclick="arrayMove('sop.steps', ${gi}, 1)">↓</button>
            <button class="btn-icon danger" title="Verwijder" onclick="arrayRemove('sop.steps', ${gi})">✕</button>
          </div>
        </div>
        <div class="form-row-3">
          <div class="form-group">
            <label class="field-label">ID</label>
            <input type="text" value="${escapeAttr(s.id)}" oninput="updateField('sop.steps.${gi}.id', this.value)">
          </div>
          <div class="form-group">
            <label class="field-label">Fase <span class="hint">verplaatst de stap</span></label>
            <select onchange="updateField('sop.steps.${gi}.phase', this.value); renderTab('taak')">${phaseOpts}</select>
          </div>
          <div class="form-group">
            <label class="field-label">Volgnummer in fase</label>
            <input type="number" min="1" value="${s.order ?? 1}" oninput="updateFieldNum('sop.steps.${gi}.order', this.value)">
          </div>
        </div>
        <div class="form-group">
          <label class="field-label">Korte titel</label>
          <input type="text" value="${escapeAttr(s.label || '')}" oninput="updateField('sop.steps.${gi}.label', this.value)">
        </div>
        <div class="form-group">
          <label class="field-label">Instructie <span class="hint">de feitelijke procedure-tekst</span></label>
          <textarea rows="2" oninput="updateField('sop.steps.${gi}.instruction', this.value)">${escapeHtml(s.instruction || '')}</textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="field-label">Locatie</label>
            <select onchange="updateField('sop.steps.${gi}.locationId', this.value || null)">${locOpts}</select>
          </div>
          <div class="form-group">
            <label class="field-label">Verwachte actie deelnemer</label>
            <input type="text" value="${escapeAttr(s.expectedAction || '')}" oninput="updateField('sop.steps.${gi}.expectedAction', this.value)">
          </div>
        </div>
        <div class="form-group">
          <label class="field-label">LSR-tags <span class="hint">relevante Life-Saving Rules</span></label>
          <div style="margin-top:4px">${lsrOpts}</div>
        </div>
      </div>`;
  }

  // ── helper: SOP-stappen van één fase ──
  function stepsForPhase(phase) {
    const list = steps.map((s, gi) => ({ s, gi })).filter(x => x.s.phase === phase);
    const inner = list.length === 0
      ? `<div class="array-empty">Nog geen SOP-stappen in deze fase.</div>`
      : list.map(x => renderStep(x.s, x.gi)).join('');
    return { count: list.length, html: inner };
  }

  // ── helper: AI-regie + ambient voor een fase ──
  function directionBlock(phase) {
    const amb = sc.ambientByPhase?.[phase] ?? null;
    // Een string-waarde betekent "eigen geluid": óf een ingevulde https-URL,
    // óf een lege string (custom gekozen, URL nog niet ingevuld). Een preset
    // is een niet-lege id zonder https-prefix; null/undefined is "geen".
    const isCustom = typeof amb === 'string' && (amb === '' || /^https:\/\//.test(amb));
    const selectVal = isCustom ? '__custom__' : (amb ?? '');
    const ambientOpts = AMBIENT_PRESETS.map(pr => {
      const v = pr.id ?? '';
      return `<option value="${v}" ${selectVal === v ? 'selected' : ''}>${escapeHtml(pr.label)}</option>`;
    }).join('');
    const urlField = isCustom ? `
      <div class="form-group" style="margin-top:10px">
        <label class="field-label">URL naar audiobestand <span class="hint">kaal .mp3 of .ogg op S3 — géén Storyline-module</span></label>
        <input type="text" value="${escapeAttr(amb)}" placeholder="https://your-bucket.s3.eu-west-1.amazonaws.com/ambient/pompzaal-loop.mp3"
               oninput="updateField('ambientByPhase.${phase}', this.value)">
      </div>` : '';
    return `
      <div class="sub-head">AI-regie &amp; sfeer</div>
      <div class="form-group">
        <label class="field-label">AI-regie voor deze fase <span class="hint">niet zichtbaar voor deelnemer — hoe rollen zich gedragen</span></label>
        <textarea rows="2" oninput="updateField('phaseConfig.${phase}.dir', this.value)">${escapeHtml(sc.phaseConfig?.[phase]?.dir || '')}</textarea>
      </div>
      <div class="form-group">
        <label class="field-label">Achtergrondgeluid</label>
        <select onchange="onAmbientSelect('${phase}', this.value)">${ambientOpts}</select>
        ${urlField}
      </div>`;
  }

  // ── helper: prep/execute actie-item ──
  function renderAction(act, idx, listKey, withCriterion) {
    const critHtml = withCriterion ? `
        <div class="form-group">
          <label class="field-label">Completion criterion <span class="hint">wanneer mag de AI deze actie aftikken</span></label>
          <textarea rows="2" oninput="updateField('assignment.${listKey}.${idx}.completionCriterion', this.value)">${escapeHtml(act.completionCriterion || '')}</textarea>
        </div>` : '';
    return `
      <div class="array-item">
        <div class="array-item-header">
          <span class="array-item-label">Actie · <code style="font-family:var(--mono);color:var(--text-dim)">${escapeHtml(act.id)}</code></span>
          <div class="array-item-actions">
            <button class="btn-icon" onclick="arrayMove('assignment.${listKey}', ${idx}, -1)">↑</button>
            <button class="btn-icon" onclick="arrayMove('assignment.${listKey}', ${idx}, 1)">↓</button>
            <button class="btn-icon danger" onclick="arrayRemove('assignment.${listKey}', ${idx})">✕</button>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="field-label">ID</label>
            <input type="text" value="${escapeAttr(act.id)}" oninput="updateField('assignment.${listKey}.${idx}.id', this.value)">
          </div>
          <div class="form-group">
            <label class="field-label">Label <span class="hint">checklist-item in het takenpaneel</span></label>
            <input type="text" value="${escapeAttr(act.label || '')}" oninput="updateField('assignment.${listKey}.${idx}.label', this.value)">
          </div>
        </div>
        ${critHtml}
      </div>`;
  }

  // ── helper: fase-blok wrapper (inklapbaar, standaard dicht) ──
  function phaseBlock(phaseId, num, name, bodyHtml, metaText) {
    const open = STATE._taakOpen[phaseId] ? ' open' : '';
    return `
      <details class="phase-block"${open} ontoggle="onPhaseToggle('${phaseId}', this.open)">
        <summary class="phase-summary">
          <span class="chevron">▶</span>
          <span class="phase-num">Fase ${num}</span>
          <span class="phase-name">${name}</span>
          <span class="phase-meta">${metaText}</span>
        </summary>
        <div class="phase-body">${bodyHtml}</div>
      </details>`;
  }

  // ===== fase-data verzamelen =====
  const prep = stepsForPhase('prep');
  const exec = stepsForPhase('execute');
  const secure = stepsForPhase('secure');
  const prepActs = a.prepActions || [];
  const execActs = a.executeActions || [];

  // — Fase 1: Voorbereiding —
  const prepBody = `
    <div class="sub-head">SOP-stappen <span class="sub-count">${prep.count}</span><span class="spacer"></span>
      <button class="btn btn-sm" onclick="addSopStep('prep')">+ Stap</button></div>
    <div class="array-items">${prep.html}</div>
    <div class="sub-head">Voorbereidings-acties <span class="sub-count">${prepActs.length}</span><span class="spacer"></span>
      <button class="btn btn-sm" onclick="addPrepAction()">+ Actie</button></div>
    <div class="section-help" style="margin-bottom:10px">Deze acties vinkt de deelnemer zélf af in het takenpaneel.</div>
    <div class="array-items">${prepActs.length ? prepActs.map((p,i)=>renderAction(p,i,'prepActions',false)).join('') : `<div class="array-empty">Geen voorbereidings-acties.</div>`}</div>
    ${directionBlock('prep')}`;

  // — Fase 2: Uitvoering —
  const execBody = `
    <div class="sub-head">SOP-stappen <span class="sub-count">${exec.count}</span><span class="spacer"></span>
      <button class="btn btn-sm" onclick="addSopStep('execute')">+ Stap</button></div>
    <div class="array-items">${exec.html}</div>
    <div class="sub-head">Uitvoerings-acties <span class="sub-count">${execActs.length}</span><span class="spacer"></span>
      <button class="btn btn-sm" onclick="addExecuteAction()">+ Actie</button></div>
    <div class="section-help" style="margin-bottom:10px">Deze acties tikt de AI af op basis van wat de deelnemer rapporteert (zie completion criterion).</div>
    <div class="array-items">${execActs.length ? execActs.map((e,i)=>renderAction(e,i,'executeActions',true)).join('') : `<div class="array-empty">Geen uitvoerings-acties.</div>`}</div>
    ${directionBlock('execute')}`;

  // — Fase 3: Afwijking —
  const stepIdOptions = ['<option value="">— bij start fase afwijking —</option>']
    .concat(steps.filter(s => s.phase === 'execute').map(s =>
      `<option value="${escapeAttr(s.id)}" ${sc.deviation?.triggerAfterStepId === s.id ? 'selected' : ''}>na ${escapeHtml(s.id)} — ${escapeHtml(s.label || '')}</option>`)).join('');
  const devBody = `
    <div class="sub-head">Afwijking-definitie</div>
    <div class="section-help" style="margin-bottom:10px">De afwijking die optreedt tijdens de uitvoering en de overgang naar Veiligstellen inluidt.</div>
    <div class="form-group">
      <label class="field-label">Trigger — na welke stap?</label>
      <select onchange="updateField('deviation.triggerAfterStepId', this.value)">${stepIdOptions}</select>
    </div>
    <div class="form-group">
      <label class="field-label">Beschrijving afwijking</label>
      <textarea rows="2" oninput="updateField('deviation.description', this.value)">${escapeHtml(sc.deviation?.description || '')}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="field-label">Onset-cue <span class="hint">eerste hoor-/zichtbare aanwijzing</span></label>
        <textarea rows="2" oninput="updateField('deviation.onsetCue', this.value)">${escapeHtml(sc.deviation?.onsetCue || '')}</textarea>
      </div>
      <div class="form-group">
        <label class="field-label">Root cause <span class="hint">wat is er echt aan de hand</span></label>
        <textarea rows="2" oninput="updateField('deviation.rootCause', this.value)">${escapeHtml(sc.deviation?.rootCause || '')}</textarea>
      </div>
    </div>
    <div class="form-group">
      <label class="field-label">Correcte respons</label>
      <textarea rows="2" oninput="updateField('deviation.correctResponse', this.value)">${escapeHtml(sc.deviation?.correctResponse || '')}</textarea>
    </div>
    <div class="form-group">
      <label class="field-label">Veelgemaakte fouten <span class="hint">één per regel</span></label>
      <textarea rows="3" class="mono" oninput="updateField('deviation.commonMistakes', this.value.split('\\n').filter(s => s.trim()))">${escapeHtml((sc.deviation?.commonMistakes || []).join('\n'))}</textarea>
    </div>
    ${directionBlock('deviation')}`;

  // — Fase 4: Veiligstellen —
  const secureBody = `
    <div class="sub-head">SOP-stappen <span class="sub-count">${secure.count}</span><span class="spacer"></span>
      <button class="btn btn-sm" onclick="addSopStep('secure')">+ Stap</button></div>
    <div class="array-items">${secure.html}</div>
    <div class="sub-head">Veiligstellen-advies</div>
    <div class="section-help" style="margin-bottom:10px">Tekst die de deelnemer in de fase Veiligstellen ziet — een advies hoe te handelen, geen checklist.</div>
    <div class="form-group">
      <textarea rows="4" oninput="updateField('assignment.secureAdvice', this.value)">${escapeHtml(a.secureAdvice || '')}</textarea>
    </div>
    ${directionBlock('secure')}`;

  // ===== eindmontage =====
  return `
    <div class="section">
      <div class="section-title">Taak &amp; procedure — kop</div>
      <div class="section-help">
        Deze tab volgt de scenario-tijdlijn. Per fase staan de SOP-stappen, de acties, de AI-regie en het achtergrondgeluid bij elkaar. <strong>SOP-stappen</strong> zijn de gedetailleerde procedure (referentie voor de deelnemer, "het hoe" voor de AI); <strong>acties</strong> zijn de grovere mijlpalen die in het takenpaneel worden afgevinkt.
      </div>
      <div class="form-group">
        <label class="field-label">Opdracht-titel <span class="hint">korte taakaanduiding voor de deelnemer</span></label>
        <input type="text" value="${escapeAttr(a.title || '')}" oninput="updateField('assignment.title', this.value)">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="field-label">SOP-titel</label>
          <input type="text" value="${escapeAttr(sc.sop?.title || '')}" oninput="updateField('sop.title', this.value)">
        </div>
        <div class="form-group">
          <label class="field-label">SOP-referentie <span class="hint">bv. SOP-PMP-014 rev 3</span></label>
          <input type="text" value="${escapeAttr(sc.sop?.reference || '')}" oninput="updateField('sop.reference', this.value)">
        </div>
      </div>
      <div class="form-group">
        <label class="field-label">SOP-samenvatting</label>
        <textarea rows="2" oninput="updateField('sop.summary', this.value)">${escapeHtml(sc.sop?.summary || '')}</textarea>
      </div>
    </div>

    ${phaseBlock('prep', 1, 'Voorbereiding', prepBody, `${prep.count} stappen · ${prepActs.length} acties`)}
    ${phaseBlock('execute', 2, 'Uitvoering', execBody, `${exec.count} stappen · ${execActs.length} acties`)}
    ${phaseBlock('deviation', 3, 'Afwijking', devBody, sc.deviation?.triggerAfterStepId ? 'trigger ingesteld' : 'geen trigger')}
    ${phaseBlock('secure', 4, 'Veiligstellen', secureBody, `${secure.count} stappen`)}
  `;
};

function onPhaseToggle(phase, isOpen) {
  STATE._taakOpen = STATE._taakOpen || {};
  STATE._taakOpen[phase] = isOpen;
}

function onAmbientSelect(phase, value) {
  // value is '' (geen), een preset-id, of '__custom__' (eigen URL)
  if (value === '__custom__') {
    // Zet een lege string zodat het URL-veld verschijnt; de auteur vult hem in.
    // Een lege string telt niet als geldige https-URL, dus de Player speelt
    // niets af tot er een echte URL staat.
    const cur = STATE.current.ambientByPhase?.[phase];
    if (typeof cur !== 'string' || !/^https:\/\//.test(cur)) {
      updateField('ambientByPhase.' + phase, '');
    }
  } else {
    updateField('ambientByPhase.' + phase, value || null);
  }
  renderTab('taak');
}

function addSopStep(phase) {
  const ph = phase || 'execute';
  const cnt = (STATE.current.sop?.steps || []).filter(s => s.phase === ph).length;
  arrayAdd('sop.steps', () => ({
    id: uid('s'), order: cnt + 1,
    phase: ph, label: '', instruction: '', locationId: null,
    expectedAction: '', lsrTags: []
  }));
}

function toggleLsrTag(stepIdx, tag, on) {
  const step = STATE.current.sop.steps[stepIdx];
  step.lsrTags = step.lsrTags || [];
  const idx = step.lsrTags.indexOf(tag);
  if (on && idx < 0) step.lsrTags.push(tag);
  if (!on && idx >= 0) step.lsrTags.splice(idx, 1);
  markUnsaved();
}

function addPrepAction() {
  arrayAdd('assignment.prepActions', () => ({ id: uid('a'), label: '' }));
}
function addExecuteAction() {
  arrayAdd('assignment.executeActions', () => ({ id: uid('e'), label: '', completionCriterion: '' }));
}

/* — HOLD-POINTS — */
TAB_RENDERERS.holdpoints = function() {
  const sc = STATE.current;
  const hps = sc.holdPoints || [];
  const isIncident = sc.scenarioType === 'incident';
  const phaseOpts = isIncident
    ? PHASES_INC.map(p => ({ v: p, l: PHASE_LABELS_INC[p] }))
    : PHASES_PROC.map(p => ({ v: p, l: PHASE_LABELS[p] }));
  const items = hps.length === 0
    ? `<div class="array-empty">Nog geen hold-points.</div>`
    : hps.map((hp, i) => {
        const catOpts = Object.entries(HOLD_POINT_CATEGORIES).map(([v,c]) =>
          `<option value="${v}" ${hp.category === v ? 'selected' : ''}>${escapeHtml(c.label)}</option>`
        ).join('');
        const phaseOptsHtml = phaseOpts.map(p =>
          `<option value="${p.v}" ${hp.phase === p.v ? 'selected' : ''}>${escapeHtml(p.l)}</option>`
        ).join('');
        const lsrOpts = ['<option value="">— niet van toepassing —</option>']
          .concat(Object.entries(LIFE_SAVING_RULES).map(([v,l]) =>
            `<option value="${v}" ${hp.lsr === v ? 'selected' : ''}>${escapeHtml(l)}</option>`
          )).join('');
        const catColor = HOLD_POINT_CATEGORIES[hp.category]?.color || 'var(--text-muted)';
        return `
          <div class="array-item" style="border-left:3px solid ${catColor}">
            <div class="array-item-header">
              <span class="array-item-label">Hold-point #${i+1} · <code style="font-family:var(--mono);color:var(--text-dim)">${escapeHtml(hp.id)}</code></span>
              <div class="array-item-actions">
                <button class="btn-icon" onclick="arrayMove('holdPoints', ${i}, -1)">↑</button>
                <button class="btn-icon" onclick="arrayMove('holdPoints', ${i}, 1)">↓</button>
                <button class="btn-icon danger" onclick="arrayRemove('holdPoints', ${i})">✕</button>
              </div>
            </div>
            <div class="form-row-3">
              <div class="form-group">
                <label class="field-label">ID</label>
                <input type="text" value="${escapeAttr(hp.id)}" oninput="updateField('holdPoints.${i}.id', this.value)">
              </div>
              <div class="form-group">
                <label class="field-label">Categorie</label>
                <select onchange="updateField('holdPoints.${i}.category', this.value); renderTab('holdpoints')">${catOpts}</select>
              </div>
              <div class="form-group">
                <label class="field-label">Fase</label>
                <select onchange="updateField('holdPoints.${i}.phase', this.value)">${phaseOptsHtml}</select>
              </div>
            </div>
            <div class="form-group">
              <label class="field-label">LSR (alleen indien categorie = Life-Saving Rule)</label>
              <select onchange="updateField('holdPoints.${i}.lsr', this.value || null)">${lsrOpts}</select>
            </div>
            <div class="form-group">
              <label class="field-label">Trigger <span class="hint">wanneer wordt dit hold-point geactiveerd</span></label>
              <textarea rows="2" oninput="updateField('holdPoints.${i}.trigger', this.value)">${escapeHtml(hp.trigger || '')}</textarea>
            </div>
            <div class="form-group">
              <label class="field-label">Stop-bericht <span class="hint">wat krijgt de deelnemer te zien bij activering</span></label>
              <textarea rows="3" oninput="updateField('holdPoints.${i}.stopMessage', this.value)">${escapeHtml(hp.stopMessage || '')}</textarea>
            </div>
          </div>`;
      }).join('');

  return `
    <div class="array-editor">
      <div class="array-header">
        <div>
          <span class="array-title">Hold-points</span>
          <span class="array-count">${hps.length}</span>
        </div>
        <button class="btn btn-sm" onclick="addHoldPoint()">+ Hold-point toevoegen</button>
      </div>
      <div class="section-help" style="margin-bottom:14px">
        Hold-points zijn harde scenario-stops. Vier categorieën: LSR (rood), procedureel (oranje), procesveiligheid (rood), milieu (groen). De Player toont een overlay in de juiste kleur en biedt geen "doorgaan-knop".
      </div>
      <div class="array-items">${items}</div>
    </div>
  `;
};

function addHoldPoint() {
  const isIncident = STATE.current?.scenarioType === 'incident';
  const defaultPhase = isIncident ? 'act' : 'execute';
  arrayAdd('holdPoints', () => ({
    id: uid('hp'), category: 'lsr', phase: defaultPhase, lsr: null,
    trigger: '', stopMessage: ''
  }));
}

/* — INCIDENT & RESPONS — */
TAB_RENDERERS.incident = function() {
  const sc = STATE.current;
  const ie = sc.initialEvent || {};
  const rp = sc.referenceProcedure || {};
  const pal = sc.participantActionLog || {};
  const pc = sc.phaseConfig || {};

  const locOptions = ['<option value="">— kies locatie —</option>']
    .concat((sc.locations || []).map(l =>
      `<option value="${escapeAttr(l.id)}" ${ie.location === l.id ? 'selected' : ''}>${escapeHtml(l.label || l.id)}</option>`
    )).join('');

  const eventTypeOpts = INITIAL_EVENT_TYPES.map(t =>
    `<option value="${t.id}" ${ie.type === t.id ? 'selected' : ''}>${escapeHtml(t.label)}</option>`
  ).join('');

  const urgencyOpts = EVENT_URGENCIES.map(u =>
    `<option value="${u.id}" ${ie.urgency === u.id ? 'selected' : ''}>${escapeHtml(u.label)}</option>`
  ).join('');

  // Expected actions array editor
  const eas = sc.expectedActions || [];
  const phaseOpts = (sel) => PHASES_INC.map(p =>
    `<option value="${p}" ${sel === p ? 'selected' : ''}>${PHASE_LABELS_INC[p]}</option>`
  ).join('');
  const prioOpts = (sel) => ACTION_PRIORITIES.map(pr =>
    `<option value="${pr.id}" ${sel === pr.id ? 'selected' : ''}>${escapeHtml(pr.label)}</option>`
  ).join('');

  const eaItems = eas.length === 0
    ? `<div class="array-empty">Nog geen verwachte acties gedefinieerd.</div>`
    : eas.map((ea, i) => {
        const lsrCheckboxes = Object.entries(LIFE_SAVING_RULES).map(([key, label]) => {
          const checked = (ea.lsrTags || []).includes(key);
          return `<label class="checkbox-row" style="font-size:12px;font-weight:normal">
                    <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleExpectedActionLsr(${i}, '${key}', this.checked)">
                    <span class="checkbox-label">${escapeHtml(label)}</span>
                  </label>`;
        }).join('');
        return `
          <div class="array-item">
            <div class="array-item-header">
              <span class="array-item-label">Actie #${i+1} · <code style="font-family:var(--mono);color:var(--text-dim)">${escapeHtml(ea.id || '')}</code></span>
              <div class="array-item-actions">
                <button class="btn-icon" onclick="arrayMove('expectedActions', ${i}, -1)">↑</button>
                <button class="btn-icon" onclick="arrayMove('expectedActions', ${i}, 1)">↓</button>
                <button class="btn-icon danger" onclick="arrayRemove('expectedActions', ${i})">✕</button>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="field-label">Fase</label>
                <select onchange="updateField('expectedActions.${i}.phase', this.value)">${phaseOpts(ea.phase)}</select>
              </div>
              <div class="form-group">
                <label class="field-label">Prioriteit</label>
                <select onchange="updateField('expectedActions.${i}.priority', this.value)">${prioOpts(ea.priority)}</select>
              </div>
            </div>
            <div class="form-group">
              <label class="field-label">Actie <span class="hint">de gewenste handeling, volledig uitgeschreven</span></label>
              <textarea rows="2" oninput="updateField('expectedActions.${i}.action', this.value)" placeholder="bv. 'Onmiddellijk stoppen, niet doorlopen, en de situatie van veilige afstand beoordelen'">${escapeHtml(ea.action || '')}</textarea>
            </div>
            <div class="form-group">
              <label class="field-label">Publieke hint <span class="hint">korte tekst die zichtbaar is voor de deelnemer in het takenpaneel — leeg laten om verborgen te houden</span></label>
              <input type="text" value="${escapeAttr(ea.publicHint || '')}" oninput="updateField('expectedActions.${i}.publicHint', this.value || null)" placeholder="bv. 'Veilige afstand bewaren'">
            </div>
            <div class="form-group">
              <label class="field-label">LSR-tags <span class="hint">Life-Saving Rules die in deze actie relevant zijn</span></label>
              <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding:8px;background:var(--surface-sunk);border-radius:var(--r-sm)">
                ${lsrCheckboxes}
              </div>
            </div>
          </div>`;
      }).join('');

  // Phase directions block — AI-regie per fase
  const phaseDirs = PHASES_INC.map(p => `
    <div class="form-group">
      <label class="field-label">AI-regie — ${PHASE_LABELS_INC[p]}</label>
      <textarea rows="2" oninput="updateField('phaseConfig.${p}.dir', this.value)" placeholder="bv. 'Laat deelnemer eerst zelf observeren; CRO is niet op de hoogte'">${escapeHtml(pc[p]?.dir || '')}</textarea>
    </div>`).join('');

  // Reference procedure (optional)
  const guidelinesText = (rp.guidelines || []).join('\n');

  return `
    <div class="section">
      <div class="section-title">Initial event</div>
      <div class="section-help">
        Wat de deelnemer als eerste waarneemt — het moment waarop het incident voor hem bestaat. Zo concreet mogelijk (zintuiglijk). Dit is wat de Player toont in de briefing-overgang.
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="field-label">Type aanleiding</label>
          <select onchange="updateField('initialEvent.type', this.value)">${eventTypeOpts}</select>
        </div>
        <div class="form-group">
          <label class="field-label">Urgentie</label>
          <select onchange="updateField('initialEvent.urgency', this.value)">${urgencyOpts}</select>
        </div>
      </div>
      <div class="form-group">
        <label class="field-label">Locatie van het event <span class="hint">waar het incident zich manifesteert</span></label>
        <select onchange="updateField('initialEvent.location', this.value)">${locOptions}</select>
      </div>
      <div class="form-group">
        <label class="field-label">Wat de deelnemer waarneemt <span class="required">*</span><span class="hint">zintuiglijk, concreet — geluid, geur, beeld, gevoel</span></label>
        <textarea rows="4" oninput="updateField('initialEvent.description', this.value)" placeholder="bv. 'Je loopt je routinerondje. Als je het tankvak passeert hoor je een onmiskenbaar sissend geluid uit de richting van pompput P-204. Aan de wind hangt een licht zoetige geur. De wind komt uit het zuidwesten, in jouw richting.'">${escapeHtml(ie.description || '')}</textarea>
      </div>
    </div>

    <div class="section">
      <div class="section-title">AI-regie per fase</div>
      <div class="section-help">Korte instructie aan de AI hoe rollen zich in elke fase moeten gedragen. Wordt meegenomen in de system prompt.</div>
      ${phaseDirs}
    </div>

    <div class="array-editor">
      <div class="array-header">
        <div>
          <span class="array-title">Verwachte acties</span>
          <span class="array-count">${eas.length}</span>
        </div>
        <button class="btn btn-sm" onclick="addExpectedAction()">+ Actie toevoegen</button>
      </div>
      <div class="section-help" style="margin-bottom:14px">
        De acties die de AI van de deelnemer verwacht, per fase. Prioriteit <strong>must</strong> = essentieel voor adequate respons; <strong>should</strong> = sterk aanbevolen; <strong>could</strong> = wenselijk indien de situatie het toelaat. <strong>Publieke hint</strong> verschijnt zichtbaar in het takenpaneel als hulpmiddel (laat leeg om de actie verborgen te houden). LSR-tags markeren acties die een Life-Saving Rule raken.
      </div>
      <div class="array-items">${eaItems}</div>
    </div>

    <div class="section">
      <div class="section-title">Referentie-procedure (optioneel)</div>
      <div class="section-help">Een beknopte richtlijn die de deelnemer eventueel kan raadplegen tijdens het scenario (Procedure-tab). Niet hetzelfde als een SOP — geen stappen, alleen kernpunten. Laat leeg om de Procedure-tab te verbergen.</div>
      <div class="form-row">
        <div class="form-group">
          <label class="field-label">Titel</label>
          <input type="text" value="${escapeAttr(rp.title || '')}" oninput="updateField('referenceProcedure.title', this.value)" placeholder="bv. 'Algemene richtlijn bij waargenomen lekkage product'">
        </div>
        <div class="form-group">
          <label class="field-label">Referentie</label>
          <input type="text" value="${escapeAttr(rp.reference || '')}" oninput="updateField('referenceProcedure.reference', this.value)" placeholder="bv. 'EMG-PRC-008 rev 2'">
        </div>
      </div>
      <div class="form-group">
        <label class="field-label">Samenvatting</label>
        <input type="text" value="${escapeAttr(rp.summary || '')}" oninput="updateField('referenceProcedure.summary', this.value)">
      </div>
      <div class="form-group">
        <label class="field-label">Kernpunten / guidelines <span class="hint">één per regel</span></label>
        <textarea rows="6" class="mono" oninput="updateField('referenceProcedure.guidelines', this.value.split('\\n').map(s => s.trim()).filter(Boolean))">${escapeHtml(guidelinesText)}</textarea>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Deelnemer-actielog</div>
      <div class="section-help">Een eenvoudig kladblok waarin de deelnemer zelf kan noteren wat hij doet en wanneer. Geen tijdregistratie door het systeem — de deelnemer schrijft zelf '13:42 — teruggetrokken naar veilige positie'. Wordt meegenomen in de debrief.</div>
      <label class="checkbox-row" style="margin-bottom:10px">
        <input type="checkbox" ${pal.enabled !== false ? 'checked' : ''} onchange="updateFieldBool('participantActionLog.enabled', this.checked)">
        <span class="checkbox-label">Actielog beschikbaar voor deelnemer</span>
      </label>
      <div class="form-group">
        <label class="field-label">Placeholder-tekst</label>
        <input type="text" value="${escapeAttr(pal.placeholder || '')}" oninput="updateField('participantActionLog.placeholder', this.value)" placeholder="bv. 'Tijd en actie (bv. \\'13:42 — bovenwinds gepositioneerd\\')'">
      </div>
    </div>
  `;
};

function addExpectedAction() {
  arrayAdd('expectedActions', () => ({
    id: uid('ea'),
    phase: 'assess',
    priority: 'must',
    action: '',
    publicHint: null,
    lsrTags: []
  }));
}

function toggleExpectedActionLsr(idx, lsrKey, on) {
  const ea = STATE.current.expectedActions?.[idx];
  if (!ea) return;
  ea.lsrTags = ea.lsrTags || [];
  const at = ea.lsrTags.indexOf(lsrKey);
  if (on && at < 0) ea.lsrTags.push(lsrKey);
  if (!on && at >= 0) ea.lsrTags.splice(at, 1);
  markUnsaved();
}

/* — WERKVERGUNNING — */
TAB_RENDERERS.permit = function() {
  const sc = STATE.current;
  const wp = sc.workPermit || {};
  // Default 'true' for legacy data that has no 'enabled' field, so existing v3 scenarios keep behavior
  const orderEnabled = wp.enabled !== false;
  const ppe = wp.requiredPPE || { standardSet: true, additional: [] };
  const additional = (ppe.additional || []).join('\n');
  const lmraQuestions = (wp.lmraQuestions || []).join('\n');
  const onSite = wp.onSiteLMRA || { required: true, prompt: '', confirmLabel: 'LMRA uitgevoerd — situatie veilig', minReflectionSec: 5 };

  return `
    <div class="section">
      <div class="section-title">Werkopdracht</div>
      <div class="section-help">
        Voor standaard, door SOP voorgeschreven activiteiten is een formele werkvergunning meestal niet vereist. Een werkopdracht is de operationele instructie — bijvoorbeeld vanuit het shift schedule of werkorder-systeem — die de deelnemer opdracht geeft de taak uit te voeren. <strong>Optioneel:</strong> alleen inschakelen als een expliciete werkopdracht onderdeel is van het scenario. De briefing kan deze context vaak al voldoende geven.
      </div>
      <label class="checkbox-row" style="margin-bottom:10px">
        <input type="checkbox" ${orderEnabled ? 'checked' : ''} onchange="updateFieldBool('workPermit.enabled', this.checked); renderTab('permit')">
        <span class="checkbox-label">Werkopdracht meegeven aan deelnemer</span>
      </label>
      ${orderEnabled ? `
      <div class="form-row">
        <div class="form-group">
          <label class="field-label">Opdrachtnummer <span class="hint">optioneel</span></label>
          <input type="text" value="${escapeAttr(wp.number || '')}" placeholder="bv. WO-2026-0184" oninput="updateField('workPermit.number', this.value)">
        </div>
        <div class="form-group">
          <label class="field-label">Voltooien voor <span class="hint">optioneel — bv. einde shift</span></label>
          <input type="text" value="${escapeAttr(wp.validUntil || '')}" placeholder="bv. 14:30" oninput="updateField('workPermit.validUntil', this.value)">
        </div>
      </div>
      <div class="form-group">
        <label class="field-label">Taakomschrijving</label>
        <textarea rows="2" oninput="updateField('workPermit.task', this.value)" placeholder="bv. Opstarten centrifugaalpomp P-101 na onderhoud, volgens SOP-PMP-014 rev 3">${escapeHtml(wp.task || '')}</textarea>
      </div>
      ` : ''}
    </div>

    <div class="section">
      <div class="section-title">PBM</div>
      <label class="checkbox-row" style="margin-bottom:10px">
        <input type="checkbox" ${ppe.standardSet ? 'checked' : ''} onchange="updateFieldBool('workPermit.requiredPPE.standardSet', this.checked)">
        <span class="checkbox-label">Standaard PBM-set vereist (helm, bril, gehoorbescherming, veiligheidsschoenen, FR-overall)</span>
      </label>
      <div class="form-group">
        <label class="field-label">Aanvullende PBM <span class="hint">één per regel</span></label>
        <textarea rows="3" class="mono" oninput="updateField('workPermit.requiredPPE.additional', this.value.split('\\n').filter(s => s.trim()))">${escapeHtml(additional)}</textarea>
      </div>
    </div>

    <div class="section">
      <div class="section-title">LMRA — voorbereiding</div>
      <div class="section-help">
        Aandachtspunten die de deelnemer doorneemt <strong>vóór vertrek naar de werkplek</strong>. Verschijnen als checklist in de Player. Generieke vragen over PBM, vluchtroutes, noodstop, SOP-revisie horen hier.
      </div>
      <label class="checkbox-row" style="margin-bottom:10px">
        <input type="checkbox" ${wp.requireLMRA ? 'checked' : ''} onchange="updateFieldBool('workPermit.requireLMRA', this.checked)">
        <span class="checkbox-label">LMRA-voorbereiding vereist vóór vertrek naar locatie</span>
      </label>
      <div class="form-group">
        <label class="field-label">LMRA-aandachtspunten <span class="hint">één per regel</span></label>
        <textarea rows="6" class="mono" oninput="updateField('workPermit.lmraQuestions', this.value.split('\\n').filter(s => s.trim()))">${escapeHtml(lmraQuestions)}</textarea>
      </div>
    </div>

    <div class="section">
      <div class="section-title">LMRA — op locatie</div>
      <div class="section-help">
        De échte LMRA: <strong>bij aankomst op de werkplek</strong> pauzeert de deelnemer om zijn omgeving te beoordelen vóór de eerste operationele handeling. Geen vooraf bepaalde checklist — wat ter plekke opvalt is per situatie anders. De deelnemer wordt gevraagd bewust stil te staan bij wat hij ziet, hoort en ruikt, en bevestigt dat met één klik. De Player toont de reflectievraag als modal zodra de deelnemer op de werklocatie aankomt en blokkeert verdere SOP-stappen tot bevestiging.
      </div>
      <label class="checkbox-row" style="margin-bottom:10px">
        <input type="checkbox" ${onSite.required !== false ? 'checked' : ''} onchange="updateFieldBool('workPermit.onSiteLMRA.required', this.checked)">
        <span class="checkbox-label">Verplichte LMRA-bevestiging bij aankomst op locatie</span>
      </label>
      <div class="form-group">
        <label class="field-label">Reflectievraag voor deelnemer <span class="hint">scenario-specifiek — wat moet hij ter plekke beoordelen?</span></label>
        <textarea rows="5" oninput="updateField('workPermit.onSiteLMRA.prompt', this.value)" placeholder="Sta even stil bij de werkplek voordat je iets aanraakt...">${escapeHtml(onSite.prompt || '')}</textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="field-label">Bevestigingsknop-label</label>
          <input type="text" value="${escapeAttr(onSite.confirmLabel || '')}" oninput="updateField('workPermit.onSiteLMRA.confirmLabel', this.value)">
        </div>
        <div class="form-group">
          <label class="field-label">Min. reflectietijd (sec) <span class="hint">knop pas actief na deze tijd — voorkomt klikken zonder denken</span></label>
          <input type="number" min="0" max="60" value="${onSite.minReflectionSec ?? 5}" oninput="updateFieldNum('workPermit.onSiteLMRA.minReflectionSec', this.value)">
        </div>
      </div>
    </div>
  `;
};

/* — BELEVING (instructor + phaseConfig + ambient + aiExtra) — */
TAB_RENDERERS.beleving = function() {
  const sc = STATE.current;
  const ins = sc.instructor || {};
  const probes = ins.sceneSpecificProbes || [];

  const probeItems = probes.length === 0
    ? `<div class="array-empty">Geen scenario-specifieke probes.</div>`
    : probes.map((pr, i) => `
        <div class="array-item">
          <div class="array-item-header">
            <span class="array-item-label">Probe #${i+1}</span>
            <div class="array-item-actions">
              <button class="btn-icon" onclick="arrayMove('instructor.sceneSpecificProbes', ${i}, -1)">↑</button>
              <button class="btn-icon" onclick="arrayMove('instructor.sceneSpecificProbes', ${i}, 1)">↓</button>
              <button class="btn-icon danger" onclick="arrayRemove('instructor.sceneSpecificProbes', ${i})">✕</button>
            </div>
          </div>
          <div class="form-group">
            <label class="field-label">Trigger</label>
            <input type="text" value="${escapeAttr(pr.trigger || '')}" oninput="updateField('instructor.sceneSpecificProbes.${i}.trigger', this.value)">
          </div>
          <div class="form-group">
            <label class="field-label">Vraag</label>
            <textarea rows="2" oninput="updateField('instructor.sceneSpecificProbes.${i}.question', this.value)">${escapeHtml(pr.question || '')}</textarea>
          </div>
        </div>`).join('');

  const modeOpts = Object.entries(INSTRUCTOR_MODES).map(([v,l]) =>
    `<option value="${v}" ${ins.mode === v ? 'selected' : ''}>${escapeHtml(l)}</option>`
  ).join('');

  return `
    <div class="section">
      <div class="section-title">Instructeur</div>
      <div class="section-help">De Instructeur is een meta-rol die kort ingrijpt bij hold-point-dreigingen en aan het eind een reflectievraag stelt. Mode bepaalt assertiviteit.</div>
      <div class="form-group">
        <label class="field-label">Mode</label>
        <select onchange="updateField('instructor.mode', this.value)">${modeOpts}</select>
      </div>
      <div class="form-group">
        <label class="field-label">Eind-reflectievraag</label>
        <textarea rows="2" oninput="updateField('instructor.endReflectionQuestion', this.value)">${escapeHtml(ins.endReflectionQuestion || '')}</textarea>
      </div>
      <div class="array-editor" style="margin-top:14px">
        <div class="array-header">
          <div><span class="array-title">Scenario-specifieke probes</span><span class="array-count">${probes.length}</span></div>
          <button class="btn btn-sm" onclick="addProbe()">+ Probe toevoegen</button>
        </div>
        ${probes.length > 0 && (ins.mode === 'stil' || ins.mode === 'observerend')
          ? `<div class="section-warn">Probes worden in mode <strong>${escapeHtml(ins.mode === 'stil' ? 'Stil' : 'Observerend')}</strong> niet gebruikt. Kies <strong>Begeleidend</strong> of <strong>Actief</strong> hierboven om ze te activeren.</div>`
          : ''}
        <div class="array-items">${probeItems}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Aanvullende AI-context</div>
      <div class="section-help">Vrij tekstveld dat in elke AI-prompt wordt meegenomen. Gebruik voor terminologie, do's &amp; don'ts, omgevingscontext. AI-regie en achtergrondgeluid per fase staan nu in het tabblad "Taak &amp; procedure".</div>
      <div class="form-group">
        <textarea rows="4" oninput="updateField('aiExtra', this.value)">${escapeHtml(sc.aiExtra || '')}</textarea>
      </div>
    </div>
  `;
};

function addProbe() {
  arrayAdd('instructor.sceneSpecificProbes', () => ({ trigger: '', question: '' }));
}

/* ───── 17. INIT ───── */
window.addEventListener('DOMContentLoaded', () => {
  STATE.scenarios = loadFromStorage();
  document.getElementById('file-import').addEventListener('change', handleImportFile);

  // Sluit modal bij klik buiten
  document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target.id === 'modal') closeModal();
  });

  // Waarschuw bij paginaverlaten met unsaved changes
  window.addEventListener('beforeunload', (e) => {
    if (STATE.unsavedChanges) {
      e.preventDefault();
      e.returnValue = '';
    }
  });

  renderList();
});
</script>
